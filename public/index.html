<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>mdevex</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #1e1e1e; color: #ccc; font-family: system-ui, sans-serif; overflow: hidden; overscroll-behavior: none; }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      position: fixed;
      inset: 0;
    }

    /* UI Slots */
    #slot-top-bar { flex-shrink: 0; }
    #slot-main { flex: 1; position: relative; overflow: hidden; touch-action: none; }
    #slot-bottom-bar { flex-shrink: 0; }
    #slot-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
    #slot-overlay > * { pointer-events: auto; }
    #slot-settings-panel { display: none; }

    /* Toolbar */
    #toolbar {
      display: flex;
      background: #111;
      border-top: 1px solid #333;
      flex-shrink: 0;
    }
    #slot-toolbar-left, #slot-toolbar-right { display: flex; flex-shrink: 0; }
    #slot-toolbar-center { display: flex; flex: 1; min-width: 0; }
  </style>
</head>
<body>
  <div id="app">
    <div id="slot-top-bar"></div>
    <div id="slot-main"></div>
    <div id="slot-bottom-bar"></div>
    <div id="toolbar">
      <div id="slot-toolbar-left"></div>
      <div id="slot-toolbar-center"></div>
      <div id="slot-toolbar-right"></div>
    </div>
    <div id="slot-overlay"></div>
    <div id="slot-settings-panel"></div>
  </div>

  <script>
    // --- Event bus ---
    const _handlers = {};
    const eventBus = {
      on(event, fn) {
        (_handlers[event] = _handlers[event] || []).push(fn);
      },
      off(event, fn) {
        const list = _handlers[event];
        if (list) _handlers[event] = list.filter(f => f !== fn);
      },
      emit(event, data) {
        (_handlers[event] || []).forEach(fn => {
          try { fn(data); } catch (e) { console.error(`Event ${event} handler error:`, e); }
        });
      },
    };

    // --- Public plugin API ---
    window.mdevex = {
      on: eventBus.on,
      off: eventBus.off,
      emit: eventBus.emit,

      settings: {
        _data: JSON.parse(localStorage.getItem('mdevex-settings') || '{}'),
        _sections: [],
        get(key) { return this._data[key]; },
        set(key, value) {
          this._data[key] = value;
          localStorage.setItem('mdevex-settings', JSON.stringify(this._data));
          eventBus.emit('settings-changed', { key, value });
          clearTimeout(this._syncTimer);
          this._syncTimer = setTimeout(() => {
            fetch('/api/settings', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(this._data) });
          }, 300);
        },
        getAll() { return { ...this._data }; },
        registerSection(opts) { this._sections.push(opts); },
        getSections() { return this._sections.slice().sort((a,b) => (a.order||0) - (b.order||0)); },
      },

      slots: {
        'top-bar': document.getElementById('slot-top-bar'),
        'main': document.getElementById('slot-main'),
        'bottom-bar': document.getElementById('slot-bottom-bar'),
        'toolbar-left': document.getElementById('slot-toolbar-left'),
        'toolbar-center': document.getElementById('slot-toolbar-center'),
        'toolbar-right': document.getElementById('slot-toolbar-right'),
        'overlay': document.getElementById('slot-overlay'),
        'settings-panel': document.getElementById('slot-settings-panel'),
      },
    };

    // --- Plugin loading (sequential to preserve order) ---
    async function loadPlugins() {
      try {
        const res = await fetch('/api/plugins');
        const plugins = await res.json();
        for (const plugin of plugins) {
          if (!plugin._hasClient) continue;
          await new Promise((resolve) => {
            const script = document.createElement('script');
            script.src = `/plugins/${plugin.id}/client.js`;
            script.onload = resolve;
            script.onerror = () => { console.warn(`Plugin ${plugin.id}: client.js load error`); resolve(); };
            document.head.appendChild(script);
          });
        }
      } catch (err) {
        console.warn('Failed to load plugins:', err);
      }
    }

    // --- Init ---
    async function init() {
      await loadPlugins();
      // Load server settings and merge
      try {
        const s = await (await fetch('/api/settings')).json();
        Object.assign(mdevex.settings._data, s);
        localStorage.setItem('mdevex-settings', JSON.stringify(mdevex.settings._data));
      } catch {}
      eventBus.emit('init');
    }

    init();
  </script>
</body>
</html>
